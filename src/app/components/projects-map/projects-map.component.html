<section id="mapsec" class="sw map-wide" style="background:#0a1830">
  <div class="si">
    <div class="shead"><div class="shb">&#127981;</div><h2 class="sht" style="color:#fff">PROYECTOS &mdash; WORLD 5</h2></div>
    <p style="font-family:var(--fb);font-size:19px;color:#666;margin-bottom:24px" class="rev">Haz clic en cada nodo del mapa para ver el proyecto</p>
    @if (projects().length > 0) {
      <div class="map-cont">
        <div class="map-inner" [style.width.px]="getMapWidth(projects().length)" [style.height.px]="getMapHeight(projects().length)">
          <svg class="map-svg" [attr.viewBox]="'0 0 ' + getMapWidth(projects().length) + ' ' + getMapHeight(projects().length)" preserveAspectRatio="none">
            <path [attr.d]="getMapPath(projects().length)" stroke="#f8b800" stroke-width="7" fill="none" stroke-dasharray="14,9" opacity="0.8"/>
            @for (project of projects(); track project.w + project.t; let i = $index) {
              <circle [attr.cx]="getNodePoint(i, projects().length).x" [attr.cy]="getNodePoint(i, projects().length).y" r="9" [attr.fill]="i === projects().length - 1 && projects().length > 1 ? '#d63031' : '#f8b800'"/>
            }
          </svg>

          @for (project of projects(); track project.w + project.t; let i = $index) {
            <div [class]="getNodeClass(i, projects().length)" [style]="getNodeStyle(i, projects().length)" (click)="openPm(i)">
              <span class="mn-i">&#128640;</span>
              <div class="mn-n">{{ project.w }}</div>
              <div class="mn-l" [innerHTML]="nodeLabel(project)"></div>
            </div>
          }
        </div>
      </div>
    } @else {
      <div class="map-empty">No hay proyectos cargados desde Google Sheets.</div>
    }
  </div>
</section>

<div class="ssep"></div>
