<!-- ===== CONTACT ===== -->
<section id="consec" class="sw contact-section">
  <div class="si">
    <div class="shead"><div class="shb">&#9993;</div><h2 class="sht contact-title">CONTACTO &mdash; WORLD 8</h2></div>
    <div class="p2h"><h3>MODO 2 JUGADORES</h3><p>Busco co-ops para proyectos, practicas y colaboraciones.</p></div>
    <div class="cg">
      <div class="rev">
        <div class="player-select">PLAYER 2 SELECT</div>
        <a href="mailto:dsotillo20@gmail.com" class="slnk">dsotillo20@gmail.com</a>
        <a href="https://github.com/DanielC-04" target="_blank" class="slnk">github.com/DanielC-04</a>
        <a href="https://linkedin.com/in/TU-USUARIO-LINKEDIN" target="_blank" class="slnk">LinkedIn &mdash; Daniel Carrasco</a>
        <div class="stbox">
          <div class="stl">STATUS</div>
          <div class="stv">DISPONIBLE</div>
          <div class="sts">Experiencia en LogicStudio &mdash; abierto a oportunidades</div>
        </div>
      </div>
      <form class="fc rev" (submit)="sendForm($event)">
        <div><label class="fl">NOMBRE:</label><input id="contact-name" class="fi" type="text" placeholder="TU NOMBRE..." required></div>
        <div><label class="fl">EMAIL:</label><input id="contact-email" class="fi" type="email" placeholder="TU@EMAIL.COM" required></div>
        <div><label class="fl">MENSAJE:</label><textarea id="contact-message" class="fa" placeholder="DESCRIBE TU MISION..." required></textarea></div>
        <button type="submit" class="btn btn-gold send-btn" id="sbtn" [disabled]="isSending()">{{ isSending() ? 'ENVIANDO...' : 'ENVIAR MISION' }}</button>
        <div id="contact-msg" class="contact-msg">{{ sendMessage() }}</div>
      </form>
    </div>
  </div>
</section>

<div class="ssep"></div>
