<section id="testsec" class="sw test-section">
  <div class="si">
    <div class="shead"><div class="shb">&#128172;</div><h2 class="sht test-title">ALDEANOS &mdash; WORLD 7</h2></div>
    <p class="test-sub">Lo que dicen los aldeanos del reino...</p>
    <div class="ald-grid" id="ald-grid">
      @for (item of testimonials(); track item.id ?? $index) {
        <div class="ald-card rev on">
          <div class="ald-hdr">
            <div class="ald-ava">
              <svg width="52" height="52" viewBox="0 0 20 20" class="ald-avatar-svg" [style]="avatarStyle(item.avatarColor)">
                <rect x="5" y="0" width="10" height="2" fill="var(--ald-avatar-color)"/>
                <rect x="4" y="2" width="12" height="2" fill="var(--ald-avatar-color)"/>
                <rect x="3" y="4" width="14" height="8" fill="#ffe0b0"/>
                <rect x="5" y="6" width="2" height="2" fill="#222"/>
                <rect x="13" y="6" width="2" height="2" fill="#222"/>
                <rect x="7" y="10" width="6" height="1" fill="#c06040"/>
                <rect x="3" y="12" width="14" height="6" fill="var(--ald-avatar-color)"/>
              </svg>
            </div>
            <div class="ald-info">
              <div class="ald-name">{{ item.name }}</div>
              <div class="ald-role">{{ item.role }}</div>
              <div class="ald-rel">{{ item.relation }}</div>
            </div>
          </div>
          <div class="ald-quote">{{ item.message }}</div>
          <div class="ald-stars">{{ starsText(item.stars) }}</div>
        </div>
      }
    </div>
    <div class="ald-form-box rev test-form-box">
      <div class="ald-form-title">DEJA TU TESTIMONIO</div>
      <form (submit)="submitAld($event)">
        <div class="ald-inputs">
          <div><label class="ald-lbl">NOMBRE:</label><input class="ald-inp" id="ald-name" placeholder="Tu nombre..." required></div>
          <div><label class="ald-lbl">ROL:</label><input class="ald-inp" id="ald-role" placeholder="Dev / Profe / Amigo..."></div>
          <div class="ald-full"><label class="ald-lbl">MENSAJE:</label><textarea class="ald-ta" id="ald-msg-inp" placeholder="Tu mensaje para Daniel..." required></textarea></div>
        </div>
        <button type="submit" class="btn btn-gold test-submit">ENVIAR TESTIMONIO</button>
      </form>
      <div id="ald-msg">{{ formMessage() }}</div>
    </div>
  </div>
</section>

<div class="ssep"></div>
